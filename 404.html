<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada | Mikla</title>
<meta name="description" content="A página que você procura não existe ou foi movida. Volte para a home da Mikla e encontre o que precisa.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://SEU-DOMINIO.com.br/404.html">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="img/icon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
<meta name="theme-color" content="#07060d">

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
:root{
  --bg:#07060d; --navy:#0D1B6E; --accent:#E0188A;
  --paper:#f6f5fb; --soft:rgba(246,245,251,0.62);
  --grad:linear-gradient(120deg,var(--navy) 0%, var(--accent) 100%);
  --disp:'Bricolage Grotesque',sans-serif; --body:'Inter',sans-serif;
}
html,body{height:100%;}
body{background:var(--bg);color:var(--paper);font-family:var(--body);line-height:1.6;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;position:relative;}
a{color:inherit;text-decoration:none;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 20px;position:relative;overflow:hidden;text-align:center;}
main::before{content:'';position:absolute;left:50%;top:50%;width:120vw;height:120vw;max-width:1200px;max-height:1200px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(224,24,138,0.16),transparent 60%);pointer-events:none;}
.wrap{position:relative;z-index:1;max-width:560px;}
.logo{width:clamp(64px,10vw,96px);height:auto;margin:0 auto 32px;}
.code{font-family:var(--disp);font-weight:800;letter-spacing:-0.03em;font-size:clamp(4rem,16vw,9rem);line-height:0.85;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
h1{font-family:var(--disp);font-weight:800;text-transform:uppercase;letter-spacing:-0.02em;font-size:clamp(1.4rem,4vw,2.2rem);margin:18px 0 14px;}
p{color:var(--soft);font-size:1.02rem;max-width:42ch;margin:0 auto 36px;}
.actions{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-bottom:44px;}
.btn{display:inline-flex;align-items:center;gap:12px;background:var(--grad);color:#fff;font-weight:600;font-size:0.98rem;padding:15px 26px;border-radius:999px;transition:transform .3s ease,box-shadow .3s ease;}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px -10px rgba(224,24,138,0.55);}
.btn.ghost{background:transparent;border:1px solid rgba(246,245,251,0.2);}
nav.links{display:flex;flex-wrap:wrap;gap:10px 24px;justify-content:center;font-family:var(--body);font-size:0.9rem;}
nav.links a{color:var(--soft);border-bottom:1px solid transparent;transition:color .25s,border-color .25s;}
nav.links a:hover{color:var(--paper);border-color:var(--accent);}
</style>
</head>
<body>
<main>
  <div class="wrap">
    <img src="img/icon-192.png" alt="Mikla" class="logo" width="96" height="96">
    <p class="code" aria-hidden="true">404</p>
    <h1>Essa página saiu do ar.</h1>
    <p>A página que você procura não existe, foi movida ou o endereço está incorreto. Vamos te levar de volta pro lugar certo.</p>
    <div class="actions">
      <a href="index.html" class="btn">
        <span>Voltar para a home</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </a>
      <a href="#" data-wa class="btn ghost">Falar no WhatsApp</a>
    </div>
    <nav class="links" aria-label="Links úteis">
      <a href="index.html#work">Portfólio</a>
      <a href="index.html#proc">Como funciona</a>
      <a href="index.html#offer">Serviços</a>
      <a href="index.html#faq">FAQ</a>
    </nav>
  </div>
</main>
<script>
(function(){
  var num = '5544988223821', msg = 'Olá, vi o site e quero um orçamento';
  var link = 'https://wa.me/' + num + '?text=' + encodeURIComponent(msg);
  document.querySelectorAll('[data-wa]').forEach(function(a){
    a.setAttribute('href', link); a.target = '_blank'; a.rel = 'noopener';
  });
})();
</script>
</body>
</html>
